{% from "components/sms-character-info.html" import sms_character_info %}

<h2 class="heading-large">SMS Character Info</h2>
<p>Live fragment count estimate below an SMS template textarea. Type in the box to see the counter update.</p>
<hr />

<div class="md:w-2/3">

  <h2 class="heading-medium">Story: SMS character info panel</h2>

  <label class="form-label" for="template_content">Message content</label>
  <textarea
    id="template_content"
    name="template_content"
    class="form-control w-full"
    data-testid="template-content"
    rows="5"
  ></textarea>

  {{ sms_character_info(sms_daily_limit="1,000", sms_prefix="") }}

</div>
