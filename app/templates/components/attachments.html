{% macro attachments_widget(mount_id, props={}, lang=None) %}
  <div id="{{ mount_id }}"></div>
  <script nonce="{{ request_nonce }}">
    (function () {
      var element = document.getElementById("{{ mount_id }}");
      if (!element) {
        return;
      }

      var props = Object.assign(
        {
          lang: {{ (lang or current_lang) | tojson }}
        },
        {{ props | tojson }}
      );
      function boot() {
        if (window.Attachments) {
          window.Attachments.load(element, props);
        }
      }

      if (!window.attachmentsLoadPromise) {
        window.attachmentsLoadPromise = new Promise(function (resolve, reject) {
          if (window.Attachments) {
            resolve();
            return;
          }

          var existingScript = document.getElementById("attachments-widget-script");
          if (existingScript) {
            existingScript.addEventListener("load", resolve, { once: true });
            existingScript.addEventListener(
              "error",
              function () {
                window.attachmentsLoadPromise = null;
                reject(new Error("Failed to load attachments script"));
              },
              { once: true },
            );
            return;
          }

          var script = document.createElement("script");
          script.id = "attachments-widget-script";
          script.type = "module";
          script.src = "{% if vite_dev_server %}http://localhost:5173/app/assets/javascripts/attachments/attachments.js{% else %}{{ asset_url('javascripts/attachments.min.js') }}{% endif %}";
          script.nonce = "{{ request_nonce }}";
          script.onload = resolve;
          script.onerror = function () {
            window.attachmentsLoadPromise = null;
            reject(new Error("Failed to load attachments script"));
          };
          document.head.appendChild(script);
        });
      }

      window.attachmentsLoadPromise.then(boot).catch(function () {});
    })();
  </script>
{% endmacro %}
